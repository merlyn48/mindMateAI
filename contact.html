<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact - MindMate AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <!-- Sidebar -->

        <aside class="sidebar">
            <h2 class="logo">MindMate AI</h2>

            <div class="sidebar-profile">
                <img id="sidebarAvatar" class="sidebar-avatar">
                <div class="sidebar-user">
                    <span id="sidebarName"></span>
                </div>
            </div>

            <!-- MAIN NAVIGATION -->

            <nav class="nav-main">
                <a href="dashboard.html">Dashboard</a>
                <a href="index.html">Chat</a>
            </nav>

            <!-- ACCOUNT -->

            <nav class="nav-secondary">
                <a href="profile.html">Profile</a>
                <a href="settings.html">Settings</a>
            </nav>

            <!-- WEBSITE PAGES -->

            <nav class="nav-info">
                <a href="about.html">About</a>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
                <a href="privacy.html">Privacy Policy</a>
            </nav>

            <button onclick="logout()" class="logout-btn">
                Logout
            </button>

        </aside>

        <!-- Main Content -->

        <main class="chat-section">

            <div class="page-wrapper">

                <div class="page-header">
                    <h1>📩 Contact Us</h1>
                    <p>Have questions or feedback? We'd love to hear from you.</p>
                </div>

                <div class="card-box">

                    <form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="639f2747-9168-4827-a211-de4f7ab9d818">

<input type="text" name="name" placeholder="Your Name" class="input-style" required>

<input type="email" name="email" placeholder="Your Email" class="input-style" required>

<textarea name="message" placeholder="Your Message" class="input-style" required></textarea>

<button type="submit" class="primary-btn">
📨 Send Message
</button>

</form>

                </div>

            </div>

        </main>

    </div>


    <script>

        function sendContact() {

            const name = document.getElementById("contactName").value;
            const email = document.getElementById("contactEmail").value;
            const message = document.getElementById("contactMessage").value;

            /* validation */

            if (!name || !email || !message) {
                showToast("Please fill all fields", "error");
                return;
            }

            const subject = "MindMate Contact Message";

            const body =
                `Name: ${name}
Email: ${email}

Message:
${message}`;

           window.open(
`https://mail.google.com/mail/?view=cm&fs=1&to=mindmateAI@proton.me&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`
);

        }

    </script>

    <script src="sidebar.js"></script>
    <script src="toast.js"></script>

</body>

</html>
