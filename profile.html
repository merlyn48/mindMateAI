<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile — MindMate AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <script>
    if (!localStorage.getItem("loggedInUser")) {
      window.location.href = "login.html";
    }
  </script>

  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

  <header class="mobile-header" aria-label="Mobile navigation">
    <button class="hamburger" onclick="openSidebar()" aria-label="Open menu" aria-expanded="false" id="hamburgerBtn">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-logo">MindMate AI</span>
  </header>

  <div class="app-container">

    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main sidebar">
      <h2 class="logo">MindMate AI</h2>

      <nav class="nav-main" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="index.html">Chat</a>
      </nav>

      <nav class="nav-secondary" aria-label="Account navigation">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>

      <nav class="nav-info" aria-label="Info pages">
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>

      <div class="sidebar-footer">
        <button id="audioToggle" class="sidebar-audio-btn" aria-label="Toggle calm audio">🎵 Calm Audio</button>
        <button onclick="logout()" class="logout-btn" aria-label="Log out">Logout</button>
      </div>
    </aside>

    <main class="chat-section profile-main" role="main">

      <div class="page-wrapper">
        <div class="page-header">
          <h1>👤 Profile</h1>
          <p>Manage your account information</p>
        </div>

        <div class="profile-avatar-section">
          <div class="avatar-wrapper">
            <img id="profileAvatar" class="profile-avatar" alt="Your profile picture">
            <label for="avatarUpload" class="avatar-upload-btn" title="Upload new photo" aria-label="Upload new profile picture">
              📷
            </label>
            <input type="file" id="avatarUpload" accept="image/*" hidden aria-label="Upload profile picture">
          </div>
          <h2 id="profileName"></h2>
          <p class="profile-email" id="profileEmail"></p>
        </div>

        <div class="card-box">
          <h3>Account Information</h3>
          <div class="setting-row">
            <span>Display Name</span>
            <strong id="profileNameDisplay"></strong>
          </div>
          <div class="setting-row">
            <span>Email</span>
            <strong id="profileEmailDisplay"></strong>
          </div>
          <div class="setting-row">
            <span>Member Since</span>
            <strong id="profileMemberSince"></strong>
          </div>
          <div class="setting-row">
            <span>Status</span>
            <strong>Active User</strong>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="sidebar.js"></script>
  <script src="toast.js"></script>
  <script src="audio.js"></script>
  <script src="effects.js"></script>

  <script>
    function safeParseJSON(val, fallback) {
      try { return val ? JSON.parse(val) : fallback; }
      catch { return fallback; }
    }

    const email = localStorage.getItem("loggedInEmail");
    const user  = email ? safeParseJSON(localStorage.getItem("mindmate_user_" + email), null) : null;

    const name       = user?.name || localStorage.getItem("loggedInUser") || "User";
    const userEmail  = user?.email || email || "-";
    const createdAt  = user?.createdAt
      ? new Date(user.createdAt).toLocaleDateString([], { year:"numeric", month:"long", day:"numeric" })
      : "Unknown";

    // Set all profile text safely
    ["profileName", "profileNameDisplay"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = name;
    });
    ["profileEmail", "profileEmailDisplay"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = userEmail;
    });
    const msEl = document.getElementById("profileMemberSince");
    if (msEl) msEl.textContent = createdAt;

    // Avatar
    const avatarEl = document.getElementById("profileAvatar");
    const savedAvatar = localStorage.getItem("mindmate_avatar_" + (email || ""));
    if (avatarEl) {
      avatarEl.src = savedAvatar ||
        "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=8b7cf6&color=fff";
    }

    // Avatar upload
    document.getElementById("avatarUpload").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        showToast("Image must be under 2MB", "error");
        return;
      }
      const reader = new FileReader();
      reader.onload = function (e) {
        if (avatarEl) avatarEl.src = e.target.result;
        try {
          localStorage.setItem("mindmate_avatar_" + (email || ""), e.target.result);
          showToast("Profile picture updated", "success");
        } catch {
          showToast("Image too large to save", "error");
        }
      };
      reader.readAsDataURL(file);
    });

    /* Mobile sidebar toggle */
    function openSidebar() {
      document.getElementById("sidebar").classList.add("sidebar-open");
      document.getElementById("sidebarOverlay").classList.add("visible");
      document.getElementById("hamburgerBtn").setAttribute("aria-expanded", "true");
    }
    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("sidebar-open");
      document.getElementById("sidebarOverlay").classList.remove("visible");
      document.getElementById("hamburgerBtn").setAttribute("aria-expanded", "false");
    }
  </script>
</body>
</html>
